<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book | Digz N' Lidz</title>
  <link rel="stylesheet" href="/assets/css/base.css">
</head>
<body>
  <div class="wrap">
    <h1>Book a session</h1>
    <div class="card">
      <form id="booking-form">
        <label>Booking type</label>
        <select id="type" style="width:100%;padding:10px;margin:8px 0;">
          <option value="family">Family</option>
          <option value="group">Group</option>
        </select>

        <label>Name</label>
        <input id="name" required style="width:100%;padding:10px;margin:8px 0;">

        <label>Email</label>
        <input id="email" type="email" required style="width:100%;padding:10px;margin:8px 0;">

        <label>Phone</label>
        <input id="phone" style="width:100%;padding:10px;margin:8px 0;">

        <label>Party size</label>
        <input id="partySize" type="number" min="1" style="width:100%;padding:10px;margin:8px 0;">

        <label>Date</label>
        <input id="bookingDate" type="date" required style="width:100%;padding:10px;margin:8px 0;">

        <label>Time slot</label>
        <input id="slotTime" type="time" required style="width:100%;padding:10px;margin:8px 0;">

        <label>Notes</label>
        <textarea id="notes" style="width:100%;padding:10px;margin:8px 0;"></textarea>

        <label>Discount code (if you have one)</label>
        <input id="discountCode" style="width:100%;padding:10px;margin:8px 0;">

        <button type="submit">Continue to deposit</button>
      </form>
      <div id="error" class="error"></div>
    </div>
    <p><small>Corporate or private event? <a href="/corporate/" style="color:var(--yellow);">Enquire here instead</a>.</small></p>
  </div>

  <script src="/assets/js/book.js"></script>
</body>
</html>
