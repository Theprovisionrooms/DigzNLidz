<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digz N' Lidz | RC Experience Cafe</title>
  <meta name="description" content="Book the RC Experience Cafe. Family, group and corporate sessions on our 16-seat RC sandpit, plus food and drink ordered straight to your seat.">
  <link rel="stylesheet" href="/assets/css/base.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "Digz N' Lidz RC Experience Cafe",
    "description": "RC sandpit experience cafe with family, group and corporate sessions, food and drink ordered to your seat.",
    "url": "https://digznlidz.co.uk"
  }
  </script>
</head>
<body>
  <img class="digger-float d1" src="/assets/img/diggers/digger-2.webp" alt="">
  <img class="digger-float d2" src="/assets/img/diggers/digger-3.webp" alt="">
  <img class="digger-float d3" src="/assets/img/diggers/digger-1.webp" alt="">

  <div class="wrap">
    <img class="brand-logo" src="/assets/img/branding/logo.webp" alt="Digz N' Lidz RC Experience Cafe">
    <div class="hazard-divider"></div>

    <div class="card">
      <h2>Book your session</h2>
      <p>Family, group, or a full RC sandpit takeover for corporate and private events.</p>
      <a href="/book/"><button>Book now</button></a>
      <a href="/corporate/"><button class="secondary">Corporate & private events</button></a>
    </div>

    <div class="card">
      <h2>At your seat</h2>
      <p>Already in? Scan the QR code at your seat to start your session and order food or drink straight to you.</p>
    </div>

    <div class="card">
      <h2>More</h2>
      <a href="/faq/" style="color:var(--yellow);display:block;margin-bottom:8px;">FAQ</a>
      <a href="/blog/" style="color:var(--yellow);display:block;margin-bottom:8px;">Blog</a>
      <a href="/podcast/" style="color:var(--yellow);display:block;">Podcast</a>
    </div>
  </div>
</body>
</html>
