<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Digz N' Lidz</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    .wrap { max-width: 900px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .seat-tile {
      aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center;
      justify-content: center; font-weight: bold; font-size: 14px;
    }
    .seat-free { background: #2c2c2c; color: #888; }
    .seat-active { background: var(--gold); color: var(--void-black); }
    .seat-awaiting_extension { background: var(--rust); color: var(--bone); }
    .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2c2c2c; }
    .stat-row:last-child { border-bottom: none; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    td, th { text-align: left; padding: 6px 4px; border-bottom: 1px solid #2c2c2c; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Digz N' Lidz — Dashboard</h1>

    <div id="login-view" class="card">
      <h2>Staff login</h2>
      <input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin:8px 0;">
      <button id="login-btn">Log in</button>
      <div id="login-error" class="error"></div>
    </div>

    <div id="dashboard-view" style="display:none;">
      <div class="card">
        <h2>Live seats</h2>
        <div class="grid" id="seat-grid"></div>
      </div>

      <div class="card">
        <h2>Revenue</h2>
        <div class="stat-row"><span>Deposits (paid)</span><span id="rev-deposits">-</span></div>
        <div class="stat-row"><span>Food & drink</span><span id="rev-food">-</span></div>
        <div class="stat-row"><span>Extensions</span><span id="rev-extensions">-</span></div>
      </div>

      <div class="card">
        <h2>Bookings</h2>
        <div class="stat-row"><span>This week</span><span id="bookings-week">-</span></div>
        <div id="bookings-today-breakdown"></div>
      </div>

      <div class="card">
        <h2>Mailing list</h2>
        <div class="stat-row"><span>Total subscribers</span><span id="mailing-count">-</span></div>
      </div>

      <div class="card">
        <h2>Corporate enquiries awaiting confirmation</h2>
        <div id="corporate-list"></div>
      </div>

      <div class="card">
        <h2>Discount codes</h2>
        <div id="discount-list"></div>
        <h3 style="font-size:14px;color:var(--gold);margin-top:16px;">New code</h3>
        <input id="dc-code" placeholder="Code, e.g. WELCOME10" style="width:100%;padding:8px;margin:6px 0;">
        <select id="dc-type" style="width:100%;padding:8px;margin:6px 0;">
          <option value="percent">Percent off</option>
          <option value="fixed">Fixed amount off (pence)</option>
        </select>
        <input id="dc-value" type="number" placeholder="Value, e.g. 10 for 10% or 500 for £5" style="width:100%;padding:8px;margin:6px 0;">
        <input id="dc-campaign" placeholder="Campaign name (optional)" style="width:100%;padding:8px;margin:6px 0;">
        <input id="dc-limit" type="number" placeholder="Usage limit (optional)" style="width:100%;padding:8px;margin:6px 0;">
        <button onclick="createDiscountCode()">Create code</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/dashboard.js"></script>
</body>
</html>
