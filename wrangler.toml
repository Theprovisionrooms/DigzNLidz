name = "digznlidz-site"
compatibility_date = "2026-07-16"
pages_build_output_dir = "public"

# Repo: github.com/Theprovisionrooms/DigzNLidz
# Domain (once connected): digznlidz.co.uk

[vars]
SITE_URL = "https://digznlidz.co.uk"
SQUARE_APPLICATION_ID = "REPLACE_WITH_SQUARE_APP_ID"   # public, safe client-side
SQUARE_LOCATION_ID_PUBLIC = "REPLACE_WITH_LOCATION_ID"  # public, safe client-side

[[d1_databases]]
binding = "DB"
database_name = "digznlidz-db"
database_id = "ed184220-8583-4633-9d47-ea653402f93e"

[[r2_buckets]]
bucket_name = "digznlidz-assets"
binding = "digznlidz_assets"

# Square + Resend keys go in Cloudflare Pages environment variables / secrets,
# never committed here.
# SQUARE_ACCESS_TOKEN
# SQUARE_LOCATION_ID
# SQUARE_WEBHOOK_SIGNATURE_KEY
# SQUARE_ENV                ("sandbox" or "production")
# RESEND_API_KEY
# DASHBOARD_PASSWORD         (shared staff password for /dashboard)
# DASHBOARD_SECRET           (random string used to sign session cookies)
